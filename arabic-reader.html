<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic Reader — Learn Through Stories</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sand:#F5EDD8; --deep:#1A1208; --ink:#2C1A0E; --rust:#C4541A;
    --gold:#D4A017; --teal:#1A6B6B; --cream:#FAF5E9; --muted:#8B7355;
    --paper:#EDE4CC; --known-bg:#E8F4E8; --known-border:#4CAF50;
    --ar-size:2.2rem;
    --root-col:#7B3F00; --prefix-col:#1A6B6B; --suffix-col:#8B2FC9;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--deep);color:var(--ink);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 80% 10%,#2A1F0A 0%,transparent 60%),radial-gradient(ellipse 40% 60% at 10% 80%,#0D2626 0%,transparent 50%),var(--deep);z-index:0;pointer-events:none;}
  .geo{position:fixed;top:0;right:0;width:300px;height:300px;opacity:0.04;pointer-events:none;z-index:0;}
  .app{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:24px 20px 80px;}

  /* Header */
  .header{text-align:center;margin-bottom:36px;padding:36px 0 28px;border-bottom:1px solid rgba(212,160,23,0.2);}
  .header-arabic{font-family:'Amiri',serif;font-size:3.5rem;color:var(--gold);line-height:1;margin-bottom:8px;text-shadow:0 0 40px rgba(212,160,23,0.3);}
  .header-title{font-size:1.05rem;font-weight:300;color:var(--muted);letter-spacing:0.3em;text-transform:uppercase;}

  /* Progress */
  .progress-section{background:rgba(245,237,216,0.06);border:1px solid rgba(212,160,23,0.15);border-radius:12px;padding:16px 24px;margin-bottom:20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
  .progress-stat{display:flex;flex-direction:column;align-items:center;min-width:70px;}
  .stat-num{font-family:'Space Mono',monospace;font-size:1.6rem;color:var(--gold);line-height:1;}
  .stat-label{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:2px;}
  .progress-bar-wrap{flex:1;min-width:150px;}
  .progress-bar-label{font-size:0.75rem;color:var(--muted);margin-bottom:6px;}
  .progress-bar{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));border-radius:3px;transition:width 0.5s ease;}

  /* Toolbar */
  .toolbar{background:rgba(245,237,216,0.05);border:1px solid rgba(212,160,23,0.12);border-radius:10px;padding:10px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .toolbar-label{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;white-space:nowrap;}
  .sz-btn{width:34px;height:34px;border-radius:8px;border:1px solid rgba(212,160,23,0.25);background:transparent;color:var(--sand);cursor:pointer;transition:all 0.18s;display:flex;align-items:center;justify-content:center;font-family:'Amiri',serif;}
  .sz-btn:hover{background:rgba(212,160,23,0.15);border-color:var(--gold);}
  .sz-btn.active{background:var(--gold);border-color:var(--gold);color:var(--deep);font-weight:700;}
  .sz-preview{font-family:'Amiri',serif;color:var(--gold);direction:rtl;transition:font-size 0.2s;}
  .audio-pill{display:none;align-items:center;gap:6px;background:rgba(196,84,26,0.12);border:1px solid rgba(196,84,26,0.3);border-radius:20px;padding:4px 12px;font-size:0.78rem;color:var(--rust);white-space:nowrap;}
  .audio-pill.on{display:inline-flex;}
  .audio-dot{width:7px;height:7px;border-radius:50%;background:var(--rust);animation:dotpulse 1s infinite;}
  @keyframes dotpulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .no-audio{font-size:0.78rem;color:var(--muted);font-style:italic;display:none;}

  /* Level tabs */
  .level-tabs{display:flex;gap:8px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;}
  .level-tab{flex-shrink:0;padding:8px 18px;border-radius:20px;border:1px solid rgba(212,160,23,0.2);background:transparent;color:var(--muted);font-family:'Crimson Pro',serif;font-size:0.9rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .level-tab:hover{border-color:var(--gold);color:var(--sand);}
  .level-tab.active{background:var(--gold);border-color:var(--gold);color:var(--deep);font-weight:600;}

  /* Known words */
  .known-section{background:rgba(245,237,216,0.05);border:1px solid rgba(212,160,23,0.1);border-radius:12px;padding:18px 22px;margin-bottom:24px;}
  .known-hdr{font-family:'Space Mono',monospace;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--gold);margin-bottom:12px;}
  .known-chips{display:flex;flex-wrap:wrap;gap:8px;}
  .known-chip{background:rgba(26,107,107,0.2);border:1px solid rgba(26,107,107,0.4);border-radius:20px;padding:4px 12px;font-family:'Amiri',serif;font-size:1.2rem;color:var(--teal);cursor:pointer;direction:rtl;transition:all 0.2s;}
  .known-chip:hover{background:rgba(26,107,107,0.35);}

  /* Story card */
  .story-card{background:var(--cream);border-radius:16px;overflow:hidden;margin-bottom:28px;box-shadow:0 8px 40px rgba(0,0,0,0.4);}
  .story-header{background:var(--paper);padding:18px 26px;border-bottom:2px solid var(--gold);display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .story-num{font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--rust);letter-spacing:0.1em;text-transform:uppercase;}
  .story-title-en{font-size:1.25rem;font-weight:600;color:var(--ink);}
  .story-title-ar{font-family:'Amiri',serif;font-size:1.5rem;color:var(--teal);margin-left:auto;}
  .story-body{padding:26px;}

  /* Controls */
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
  .btn{padding:8px 16px;border-radius:8px;border:1px solid;font-family:'Crimson Pro',serif;font-size:0.9rem;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;}
  .btn-outline{background:transparent;border-color:rgba(44,26,14,0.22);color:var(--ink);}
  .btn-outline:hover{background:rgba(44,26,14,0.07);}
  .btn-outline.active{background:var(--teal);border-color:var(--teal);color:white;}
  .btn-gold{background:var(--gold);border-color:var(--gold);color:var(--deep);font-weight:600;}
  .btn-gold:hover{filter:brightness(1.08);}
  .btn-play{background:var(--rust);border-color:var(--rust);color:white;font-weight:600;}
  .btn-play:hover{filter:brightness(1.1);}
  .btn-play.speaking{background:#8B2000;animation:playpulse 1.2s infinite;}
  @keyframes playpulse{0%,100%{box-shadow:0 0 0 0 rgba(196,84,26,0.4)}50%{box-shadow:0 0 0 8px rgba(196,84,26,0)}}

  /* Sentence nav */
  .sent-nav{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .sent-btn{width:30px;height:30px;border-radius:50%;border:1px solid rgba(44,26,14,0.15);background:white;font-size:0.75rem;cursor:pointer;font-family:'Space Mono',monospace;color:var(--muted);transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
  .sent-btn.active{background:var(--rust);border-color:var(--rust);color:white;}
  .sent-btn:hover:not(.active){border-color:var(--gold);color:var(--ink);}

  /* Arabic text */
  .arabic-text{font-family:'Amiri',serif;font-size:var(--ar-size);line-height:2.5;color:var(--ink);direction:rtl;text-align:right;margin-bottom:20px;background:white;border-radius:12px;padding:28px 32px;border:1px solid rgba(44,26,14,0.1);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  .ar-sentence{display:block;margin-bottom:0.6em;}
  .ar-sentence:last-child{margin-bottom:0;}
  .arabic-word{display:inline;cursor:pointer;border-bottom:2px solid transparent;transition:background 0.15s,border-color 0.15s;padding:2px 3px;border-radius:4px;}
  .arabic-word:hover{background:rgba(212,160,23,0.22);border-bottom-color:var(--gold);}
  .arabic-word.known{color:var(--teal);border-bottom-color:rgba(26,107,107,0.3);opacity:0.65;}
  /* Verbs get a subtle underline hint */
  .arabic-word.is-verb{border-bottom:2px dashed rgba(196,84,26,0.35);}
  .arabic-word.is-verb:hover{border-bottom-color:var(--rust);}

  .sent-spk{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(196,84,26,0.28);background:transparent;color:var(--rust);font-size:0.85rem;cursor:pointer;margin-left:8px;transition:all 0.18s;vertical-align:middle;flex-shrink:0;}
  .sent-spk:hover{background:var(--rust);color:white;border-color:var(--rust);}

  .translit{font-style:italic;font-size:1.05rem;color:var(--muted);text-align:center;margin-bottom:14px;padding:12px 16px;background:rgba(44,26,14,0.04);border-radius:8px;display:none;line-height:1.9;}
  .translit.on{display:block;}
  .transl{font-size:1.1rem;color:var(--ink);margin-bottom:20px;padding:12px 16px;background:rgba(196,84,26,0.06);border-left:3px solid var(--rust);border-radius:0 8px 8px 0;display:none;font-style:italic;line-height:1.8;}
  .transl.on{display:block;}

  /* Vocab */
  .vocab-section{margin-top:18px;}
  .vocab-hdr{font-family:'Space Mono',monospace;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .vocab-hdr::after{content:'';flex:1;height:1px;background:rgba(44,26,14,0.12);}
  .vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;}
  .vocab-card{background:white;border:1px solid rgba(44,26,14,0.1);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
  .vocab-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);transition:width 0.2s;}
  .vocab-card.is-verb::before{background:var(--rust);}
  .vocab-card:hover{box-shadow:0 4px 16px rgba(44,26,14,0.1);}
  .vocab-card:hover::before{width:5px;}
  .vocab-card.known{background:var(--known-bg);border-color:var(--known-border);opacity:0.6;}
  .vocab-card.known::before{background:var(--known-border);}
  .vocab-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;}
  .vocab-ar{font-family:'Amiri',serif;font-size:1.8rem;color:var(--ink);direction:rtl;line-height:1.3;}
  .vocab-spk{flex-shrink:0;width:26px;height:26px;border-radius:50%;border:1px solid rgba(196,84,26,0.3);background:transparent;color:var(--rust);font-size:0.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s;margin-top:2px;}
  .vocab-spk:hover{background:var(--rust);color:white;border-color:var(--rust);}
  .vocab-translit{font-size:0.78rem;font-style:italic;color:var(--muted);margin-bottom:3px;}
  .vocab-en{font-size:0.85rem;color:var(--rust);font-weight:600;}
  .vocab-tag{font-size:0.68rem;font-family:'Space Mono',monospace;background:rgba(196,84,26,0.1);color:var(--rust);border-radius:4px;padding:1px 5px;margin-top:4px;display:inline-block;}
  .vocab-mark{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(44,26,14,0.15);display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;}
  .vocab-card.known .vocab-mark{background:var(--known-border);border-color:var(--known-border);color:white;}

  /* Tooltip */
  .tip{position:fixed;background:var(--deep);color:var(--sand);border:1px solid var(--gold);border-radius:10px;padding:12px 16px;font-size:0.9rem;z-index:1000;pointer-events:none;max-width:220px;box-shadow:0 8px 30px rgba(0,0,0,0.5);display:none;}
  .tip.on{display:block;}
  .tip-ar{font-family:'Amiri',serif;font-size:1.7rem;direction:rtl;text-align:right;color:var(--gold);}
  .tip-translit{font-style:italic;color:var(--muted);font-size:0.78rem;margin:2px 0;}
  .tip-en{color:white;font-weight:600;}
  .tip-verb{font-size:0.68rem;color:rgba(196,84,26,0.8);margin-top:3px;}
  .tip-hint{font-size:0.68rem;color:rgba(212,160,23,0.5);margin-top:3px;}

  /* ══ POPUP ══ */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px);padding:16px;}
  .overlay.on{display:flex;}
  .popup{background:var(--cream);border-radius:18px;padding:28px 24px;max-width:420px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);border:2px solid var(--gold);max-height:90vh;overflow-y:auto;}
  .pop-ar{font-family:'Amiri',serif;font-size:4rem;color:var(--ink);direction:rtl;line-height:1.2;cursor:pointer;transition:color 0.15s;}
  .pop-ar:hover{color:var(--rust);}
  .pop-hint{font-size:0.72rem;color:var(--muted);margin:-2px 0 10px;}
  .pop-translit{font-style:italic;color:var(--muted);font-size:1.05rem;margin-bottom:4px;}
  .pop-en{font-size:1.4rem;color:var(--rust);font-weight:600;margin-bottom:14px;}
  .pop-ctx{font-size:0.85rem;color:var(--muted);margin-bottom:18px;padding:10px;background:rgba(44,26,14,0.05);border-radius:8px;font-style:italic;}
  .pop-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px;}

  /* ── Verb anatomy panel ── */
  .verb-panel{margin:4px 0 18px;text-align:left;border:1.5px solid rgba(196,84,26,0.25);border-radius:12px;overflow:hidden;background:white;}
  .verb-panel-hdr{background:var(--rust);color:white;font-family:'Space Mono',monospace;font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;padding:8px 14px;display:flex;align-items:center;gap:8px;}
  .verb-panel-body{padding:16px 14px;}

  /* The word anatomy display */
  .anatomy-wrap{direction:rtl;text-align:center;margin-bottom:16px;}
  .anatomy-word{font-family:'Amiri',serif;font-size:2.6rem;line-height:1;display:inline-flex;gap:0;align-items:flex-end;}
  .part-prefix{color:var(--prefix-col);position:relative;}
  .part-root{color:var(--root-col);font-weight:700;position:relative;}
  .part-suffix{color:var(--suffix-col);position:relative;}
  .part-plain{color:var(--ink);}

  /* Labels below each part */
  .anatomy-labels{display:flex;justify-content:center;gap:0;direction:rtl;margin-top:6px;font-size:0.7rem;font-family:'Space Mono',monospace;}
  .lbl{text-align:center;white-space:nowrap;padding:0 3px;}
  .lbl-prefix{color:var(--prefix-col);}
  .lbl-root{color:var(--root-col);}
  .lbl-suffix{color:var(--suffix-col);}

  /* Info rows */
  .verb-row{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;font-size:0.9rem;}
  .verb-row:last-child{margin-bottom:0;}
  .verb-key{font-family:'Space Mono',monospace;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);min-width:64px;flex-shrink:0;}
  .verb-val{color:var(--ink);line-height:1.4;}
  .verb-val strong{color:var(--rust);}
  .verb-val .ar-inline{font-family:'Amiri',serif;font-size:1.2rem;direction:rtl;color:var(--root-col);}

  /* Root letters display */
  .root-display{font-family:'Amiri',serif;font-size:1.6rem;direction:rtl;color:var(--root-col);letter-spacing:0.1em;margin-bottom:2px;}

  /* Related forms mini-table */
  .forms-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px;}
  .form-item{background:rgba(44,26,14,0.04);border-radius:6px;padding:6px 8px;border:1px solid rgba(44,26,14,0.08);}
  .form-label{font-size:0.68rem;font-family:'Space Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
  .form-ar{font-family:'Amiri',serif;font-size:1.3rem;direction:rtl;color:var(--ink);}
  .form-tr{font-size:0.72rem;font-style:italic;color:var(--muted);}
  .form-en{font-size:0.75rem;color:var(--rust);}

  /* Explanation prose */
  .verb-explain{font-size:0.88rem;color:var(--muted);line-height:1.6;margin-top:12px;padding:10px 12px;background:rgba(212,160,23,0.06);border-radius:8px;border-left:3px solid var(--gold);text-align:left;}

  /* Legend */
  .anatomy-legend{display:flex;gap:12px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;}
  .leg-item{display:flex;align-items:center;gap:4px;font-size:0.72rem;}
  .leg-dot{width:9px;height:9px;border-radius:50%;}

  @media(max-width:600px){
    .arabic-text{padding:20px 16px;}
    .story-body{padding:18px;}
    .vocab-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));}
    .header-arabic{font-size:2.5rem;}
    .pop-ar{font-size:3rem;}
    .anatomy-word{font-size:2rem;}
    .forms-grid{grid-template-columns:1fr;}
  }

  /* ══ PRACTICE ZONE ══ */
  .practice-zone{margin-top:24px;border-top:2px dashed rgba(212,160,23,0.25);padding-top:20px;}
  .practice-hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
  .practice-title{font-family:"Space Mono",monospace;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--gold);}
  .game-tabs{display:flex;gap:6px;flex-wrap:wrap;}
  .game-tab{padding:6px 14px;border-radius:20px;border:1px solid rgba(212,160,23,0.25);background:transparent;color:var(--muted);font-family:"Crimson Pro",serif;font-size:0.85rem;cursor:pointer;transition:all 0.18s;white-space:nowrap;}
  .game-tab:hover{border-color:var(--gold);color:var(--ink);}
  .game-tab.active{background:var(--gold);border-color:var(--gold);color:var(--deep);font-weight:600;}
  .game-area{background:white;border-radius:12px;padding:22px;border:1px solid rgba(44,26,14,0.1);min-height:180px;}
  .score-strip{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap;}
  .score-pill{font-family:"Space Mono",monospace;font-size:0.75rem;background:rgba(212,160,23,0.1);border:1px solid rgba(212,160,23,0.22);border-radius:20px;padding:4px 12px;color:var(--ink);}
  .score-pill span{color:var(--gold);font-weight:700;}
  .progress-dots{display:flex;gap:5px;flex-wrap:wrap;}
  .pdot{width:10px;height:10px;border-radius:50%;background:rgba(44,26,14,0.12);transition:background 0.3s;}
  .pdot.correct{background:var(--known-border);}
  .pdot.wrong{background:var(--rust);}
  .pdot.cur{background:var(--gold);animation:dotpulse 0.8s infinite;}
  .flashcard-wrap{perspective:900px;width:100%;max-width:340px;margin:0 auto;height:155px;cursor:pointer;}
  .flashcard{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.45s ease;border-radius:14px;}
  .flashcard.flipped{transform:rotateY(180deg);}
  .fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;text-align:center;}
  .fc-front{background:linear-gradient(135deg,#FDF6E3,#EDE4CC);border:2px solid var(--gold);}
  .fc-back{background:linear-gradient(135deg,#E8F4FF,#D4EAF7);border:2px solid var(--teal);transform:rotateY(180deg);}
  .fc-label{font-family:"Space Mono",monospace;font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:6px;}
  .fc-ar{font-family:"Amiri",serif;font-size:2.8rem;color:var(--ink);direction:rtl;line-height:1.1;}
  .fc-tr{font-size:0.82rem;font-style:italic;color:var(--muted);margin-top:3px;}
  .fc-en{font-size:1.25rem;font-weight:600;color:var(--teal);}
  .fc-hint{font-size:0.72rem;color:var(--muted);margin-top:8px;font-style:italic;}
  .fc-nav{display:flex;gap:8px;justify-content:center;margin-top:14px;align-items:center;}
  .fc-counter{font-family:"Space Mono",monospace;font-size:0.75rem;color:var(--muted);}
  .fc-btn{padding:5px 12px;border-radius:6px;font-size:0.8rem;font-family:"Crimson Pro",serif;cursor:pointer;border:1px solid;transition:all 0.18s;}
  .fc-yes{background:rgba(76,175,80,0.1);border-color:var(--known-border);color:#2E7D32;}
  .fc-yes:hover{background:var(--known-border);color:white;}
  .fc-no{background:rgba(196,84,26,0.08);border-color:var(--rust);color:var(--rust);}
  .fc-no:hover{background:var(--rust);color:white;}

<script>
/* ════════════════════════════════════════════════
   VERB ANATOMY DATA
   Each verb entry carries:
   - root: the three (or four) root letters as an array
   - rootMeaning: what the root concept means
   - tense: 'present' | 'past' | 'imperative' | 'masdar'
   - person: 'I' | 'you(m)' | 'he' | 'she' | 'we' etc.
   - prefix: the prefix letter(s) on this form ('' if none)
   - suffix: the suffix letter(s) on this form ('' if none)
   - coreAr: the root letters as they appear inside the word (may have vowel changes)
   - pattern: e.g. "فَعَلَ" — the abstract verb pattern
   - explain: short friendly explanation
   - forms: related forms to show side by side [{label, ar, translit, en}]
════════════════════════════════════════════════ */
const VERB_DATA = {
  // ── ذ-ه-ب (go) ──
  "أذهب": {
    root:['ذ','ه','ب'], rootMeaning:"go / leave",
    tense:"present (I)", person:"I",
    prefix:"أَ", suffix:"",
    coreAr:"ذهب",
    pattern:"أَفْعَل",
    explain:"Arabic present tense is made by adding a prefix to the root. The prefix <strong>أَ</strong> (a-) signals <em>I</em>. So the three-letter root ذ-ه-ب (go) with the prefix أ gives you <strong>أذهب</strong> — 'I go'. Change the prefix and you change the person: يذهب (he goes), تذهب (she/you go).",
    forms:[
      {label:"I go",ar:"أَذْهَبُ",translit:"adhabu",en:"I go"},
      {label:"He goes",ar:"يَذْهَبُ",translit:"yadhabu",en:"he goes"},
      {label:"She goes",ar:"تَذْهَبُ",translit:"tadhabu",en:"she goes"},
      {label:"I went",ar:"ذَهَبْتُ",translit:"dhahabtu",en:"I went"},
    ]
  },
  "ذهبت": {
    root:['ذ','ه','ب'], rootMeaning:"go / leave",
    tense:"past (I)", person:"I",
    prefix:"", suffix:"تُ",
    coreAr:"ذهب",
    pattern:"فَعَلْتُ",
    explain:"In Arabic, the <strong>past tense</strong> works very differently to present. Instead of a prefix, you add a <strong>suffix</strong> to the root. The suffix <strong>تُ</strong> (-tu) means <em>I</em> did it. So ذ-ه-ب + تُ = <strong>ذهبتُ</strong> — 'I went'. No prefix needed at all! Compare: أذهب (I go) vs ذهبتُ (I went).",
    forms:[
      {label:"I went",ar:"ذَهَبْتُ",translit:"dhahabtu",en:"I went"},
      {label:"He went",ar:"ذَهَبَ",translit:"dhahaba",en:"he went"},
      {label:"She went",ar:"ذَهَبَتْ",translit:"dhahabat",en:"she went"},
      {label:"I go",ar:"أَذْهَبُ",translit:"adhabu",en:"I go"},
    ]
  },
  // ── ح-ب-ب (love) ──
  "أحب": {
    root:['ح','ب','ب'], rootMeaning:"love / like",
    tense:"present (I)", person:"I",
    prefix:"أُ", suffix:"",
    coreAr:"حب",
    pattern:"أُفْعِل",
    explain:"The root ح-ب-ب means love. In present tense for <em>I</em>, we add the prefix <strong>أُ</strong> (u-). The doubled ب in the middle gets compressed — a common feature of roots with repeated letters. So أُ + حبب → <strong>أُحِبّ</strong> — 'I love'. The doubled letter is written with a shadda (ّ) above it.",
    forms:[
      {label:"I love",ar:"أُحِبُّ",translit:"uhibbu",en:"I love"},
      {label:"He loves",ar:"يُحِبُّ",translit:"yuhibbu",en:"he loves"},
      {label:"I loved",ar:"أَحْبَبْتُ",translit:"ahbabtu",en:"I loved"},
      {label:"Love (noun)",ar:"حُبّ",translit:"hubb",en:"love"},
    ]
  },
  // ── ش-ر-ب (drink) ──
  "أشرب": {
    root:['أ','ش','ر','ب'], rootMeaning:"drink",
    tense:"present (I)", person:"I",
    prefix:"أَ", suffix:"",
    coreAr:"شرب",
    pattern:"أَفْعَل",
    explain:"Root: ش-ر-ب (drink). Add the present-tense prefix <strong>أَ</strong> for <em>I</em> → <strong>أشرب</strong> (I drink). Notice the pattern is the same as أذهب (I go) — Arabic verbs follow regular patterns once you spot the root.",
    forms:[
      {label:"I drink",ar:"أَشْرَبُ",translit:"ashrabu",en:"I drink"},
      {label:"He drinks",ar:"يَشْرَبُ",translit:"yashrabu",en:"he drinks"},
      {label:"I drank",ar:"شَرِبْتُ",translit:"sharibtu",en:"I drank"},
      {label:"Drink!",ar:"اِشْرَبْ",translit:"ishrab",en:"drink! (imperative)"},
    ]
  },
  // ── أ-ك-ل (eat) ──
  "آكل": {
    root:['أ','ك','ل'], rootMeaning:"eat",
    tense:"present (I)", person:"I",
    prefix:"آ", suffix:"",
    coreAr:"كل",
    pattern:"آفْعَل",
    explain:"Root: أ-ك-ل (eat). The present prefix for <em>I</em> is أَ, but when the root itself starts with أ, the two أ letters merge and stretch into <strong>آ</strong> (a long 'aa' sound). So أَ + أكل = <strong>آكل</strong> — 'I eat'. This merging is called <em>madda</em> and just prevents two hamzas sitting together.",
    forms:[
      {label:"I eat",ar:"آكُلُ",translit:"akulu",en:"I eat"},
      {label:"He eats",ar:"يَأْكُلُ",translit:"ya'kulu",en:"he eats"},
      {label:"I ate",ar:"أَكَلْتُ",translit:"akaltu",en:"I ate"},
      {label:"Food",ar:"أَكْل",translit:"akl",en:"food / eating"},
    ]
  },
  // ── ي-ق-ظ (wake) ──
  "أستيقظ": {
    root:['ي','ق','ظ'], rootMeaning:"be awake / alert",
    tense:"present (I)", person:"I",
    prefix:"أَسْتَ", suffix:"",
    coreAr:"يقظ",
    pattern:"أَسْتَفْعِل (Form X)",
    explain:"This is a <strong>Form X</strong> verb — one of Arabic's ten verb patterns. Form X adds the prefix <strong>أَسْتَ</strong> and carries the idea of 'seeking' or 'causing oneself to' do something. أَسْتَيْقَظ literally means 'I make myself awake' → 'I wake up'. The longer prefix is the whole clue — once you know Form X, you'll recognise it everywhere.",
    forms:[
      {label:"I wake up",ar:"أَسْتَيْقِظُ",translit:"astayqizu",en:"I wake up"},
      {label:"He wakes up",ar:"يَسْتَيْقِظُ",translit:"yastayqizu",en:"he wakes up"},
      {label:"I woke up",ar:"اِسْتَيْقَظْتُ",translit:"istayqaztu",en:"I woke up"},
    ]
  },
  // ── س-ف-ر (travel) ──
  "سافرت": {
    root:['س','ف','ر'], rootMeaning:"travel / journey",
    tense:"past (I)", person:"I",
    prefix:"", suffix:"تُ",
    coreAr:"سافر",
    pattern:"فَاعَلْتُ (Form III past + I-suffix)",
    explain:"Root: س-ف-ر (travel). This is a <strong>Form III</strong> verb, which stretches the first root letter with a long vowel: سَافَرَ (he travelled). For <em>I</em> in the past, add the suffix <strong>تُ</strong> → <strong>سافرتُ</strong>. Form III often adds the idea of doing something with/to someone — سافَرَ means 'he made a journey'.",
    forms:[
      {label:"I travelled",ar:"سَافَرْتُ",translit:"safart",en:"I travelled"},
      {label:"He travelled",ar:"سَافَرَ",translit:"safara",en:"he travelled"},
      {label:"I travel",ar:"أُسَافِرُ",translit:"usafiru",en:"I travel"},
      {label:"Travel (noun)",ar:"سَفَر",translit:"safar",en:"journey / travel"},
    ]
  },
  // ── ز-ر (visit) ──
  "زرت": {
    root:['ز','و','ر'], rootMeaning:"visit",
    tense:"past (I)", person:"I",
    prefix:"", suffix:"تُ",
    coreAr:"زر",
    pattern:"فَعَلْتُ",
    explain:"Root: ز-و-ر (visit). In the past tense, the middle weak letter و disappears — this is a <strong>hollow verb</strong>, very common in Arabic. So instead of زَوَرَ, it contracts to زَارَ (he visited). Add <strong>تُ</strong> for <em>I</em> → <strong>زُرْتُ</strong> (I visited). The vowel shortens too. Hollow verbs look shorter than you'd expect!",
    forms:[
      {label:"I visited",ar:"زُرْتُ",translit:"zurtu",en:"I visited"},
      {label:"He visited",ar:"زَارَ",translit:"zara",en:"he visited"},
      {label:"I visit",ar:"أَزُورُ",translit:"azuru",en:"I visit"},
      {label:"Visit (noun)",ar:"زِيَارَة",translit:"ziyara",en:"visit"},
    ]
  },
  // ── ش-ر-ي (buy) ──
  "اشتريت": {
    root:['ش','ر','ي'], rootMeaning:"buy / purchase",
    tense:"past (I)", person:"I",
    prefix:"اِشْتَ", suffix:"يْتُ",
    coreAr:"شر",
    pattern:"اِفْتَعَلْتُ (Form VIII)",
    explain:"Root: ش-ر-ي (buy). This is <strong>Form VIII</strong>, which inserts the letter <strong>تَ</strong> after the first root letter and adds the prefix اِ. The pattern is اِفْتَعَل. The final weak letter ي merges into the suffix: اِشْتَرَى (he bought) → اِشْتَرَيْتُ (I bought). Form VIII often carries an active, deliberate sense.",
    forms:[
      {label:"I bought",ar:"اِشْتَرَيْتُ",translit:"ishtaraytu",en:"I bought"},
      {label:"He bought",ar:"اِشْتَرَى",translit:"ishtara",en:"he bought"},
      {label:"I buy",ar:"أَشْتَرِي",translit:"ashtari",en:"I buy"},
      {label:"Purchase",ar:"شِرَاء",translit:"shira'",en:"purchase / buying"},
    ]
  },
  // ── ع-و-د (return) ──
  "أعود": {
    root:['ع','و','د'], rootMeaning:"return / come back",
    tense:"present (I)", person:"I",
    prefix:"أَ", suffix:"",
    coreAr:"عود",
    pattern:"أَفُول (hollow present)",
    explain:"Root: ع-و-د (return). Another hollow verb — the middle letter و is weak and changes with the vowels. In the present tense with the <em>I</em>-prefix أَ, it surfaces as <strong>أعود</strong> (a-'ood). The و here is actually part of the word because the present vowel pattern keeps it visible, unlike some past forms where it disappears.",
    forms:[
      {label:"I return",ar:"أَعُودُ",translit:"a'udu",en:"I return"},
      {label:"He returns",ar:"يَعُودُ",translit:"ya'udu",en:"he returns"},
      {label:"I returned",ar:"عُدْتُ",translit:"'udtu",en:"I returned"},
      {label:"Return (noun)",ar:"عَوْدَة",translit:"'awda",en:"return / comeback"},
    ]
  },
  // ── ش-ع-ر (feel) ──
  "أشعر": {
    root:['ش','ع','ر'], rootMeaning:"feel / sense / perceive",
    tense:"present (I)", person:"I",
    prefix:"أَ", suffix:"",
    coreAr:"شعر",
    pattern:"أَفْعُر",
    explain:"Root: ش-ع-ر (feel/sense). Present tense, first person — add prefix <strong>أَ</strong> → <strong>أشعر</strong> (I feel). The same root gives شِعْر (poetry) and شَعْر (hair) — Arabic roots radiate out into many related words. Once you know a root, you can often guess new words built from it.",
    forms:[
      {label:"I feel",ar:"أَشْعُرُ",translit:"ash'uru",en:"I feel"},
      {label:"He feels",ar:"يَشْعُرُ",translit:"yash'uru",en:"he feels"},
      {label:"I felt",ar:"شَعَرْتُ",translit:"sha'artu",en:"I felt"},
      {label:"Poetry",ar:"شِعْر",translit:"shi'r",en:"poetry (same root!)"},
    ]
  },
  // ── ر-ي-د (want) ──
  "أريد": {
    root:['ر','و','د'], rootMeaning:"want / desire",
    tense:"present (I)", person:"I",
    prefix:"أُ", suffix:"",
    coreAr:"ريد",
    pattern:"أُفِيل (Form IV hollow)",
    explain:"Root: ر-و-د (want/seek). This is a <strong>Form IV</strong> verb with a hollow middle. Form IV adds an أ to the beginning and doubles the vowel effect. In the present tense for <em>I</em>: أُرِيدُ → <strong>أريد</strong> (I want/wish). You'll hear أريد أن... (I want to...) constantly in everyday Arabic.",
    forms:[
      {label:"I want",ar:"أُرِيدُ",translit:"uridu",en:"I want"},
      {label:"He wants",ar:"يُرِيدُ",translit:"yuridu",en:"he wants"},
      {label:"I wanted",ar:"أَرَدْتُ",translit:"aradtu",en:"I wanted"},
      {label:"Will / intention",ar:"إِرَادَة",translit:"irada",en:"will / desire"},
    ]
  },
  // ══ Level 4 new verbs ══

  // ق-ر-أ (read) — past
  "قرأت": {
    root:['ق','ر','أ'], rootMeaning:"read",
    tense:"past (I)", person:"I", prefix:"", suffix:"تُ", coreAr:"قرأ", pattern:"فَعَلْتُ",
    explain:"Root: ق-ر-أ (read). Same past pattern you know: root + <strong>تُ</strong> = <strong>قَرَأْتُ</strong> (I read). The root ends in hamza ء which stays stable. The same root gives قُرْآن (Quran — literally 'the recitation'), قِرَاءَة (reading). A truly important root.",
    forms:[
      {label:"I read (past)",ar:"قَرَأْتُ",translit:"qara'tu",en:"I read"},
      {label:"He read",ar:"قَرَأَ",translit:"qara'a",en:"he read"},
      {label:"I read (present)",ar:"أَقْرَأُ",translit:"aqra'u",en:"I read"},
      {label:"Reading",ar:"قِرَاءَة",translit:"qira'a",en:"reading"},
    ]
  },
 // ق-ر-أ (read) — present
  "أقرأ": {
    root:['ق','ر','أ'], rootMeaning:"read",
    tense:"present (I)", person:"I", prefix:"أَ", suffix:"", coreAr:"قرأ", pattern:"أَفْعَل",
    explain:"Same root ق-ر-أ. Present tense swaps the suffix تُ for the prefix <strong>أَ</strong> → <strong>أقرأُ</strong> (I read). This is the core rule: <em>past = suffix after root, present = prefix before root</em>. The same swap works for every regular verb.",
    forms:[
      {label:"I read",ar:"أَقْرَأُ",translit:"aqra'u",en:"I read"},

/* ════════════════════════════════════════════════  AUDIO  */
const synth = window.speechSynthesis;
let arVoice = null;
function initAudio() {
  if (!synth) { document.getElementById('noAudio').style.display='inline'; return; }
  function pick() {
    const vv = synth.getVoices();
    arVoice = vv.find(v=>v.lang==='ar-SA')||vv.find(v=>v.lang==='ar-EG')||vv.find(v=>v.lang&&v.lang.startsWith('ar'));
    if (!arVoice && vv.length>0) {
      document.getElementById('noAudio').style.display='inline';
      document.getElementById('noAudio').textContent='⚠ No Arabic voice installed — add one in Settings › Accessibility › Spoken Content';
    }
  }
  pick();
  if (synth.onvoiceschanged!==undefined) synth.onvoiceschanged=pick;
}
function speak(text, rate=0.8) {
  if (!synth) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='ar-SA'; u.rate=rate; u.pitch=1.0;
  if (arVoice) u.voice=arVoice;
  const pill=document.getElementById('audioPill');
  pill.classList.add('on');
  u.onend=u.onerror=()=>pill.classList.remove('on');
  synth.speak(u);
}
function speakSentence(sid,si) {
  const s=STORIES.find(x=>x.id===sid).sentences[si];
  speak(s.ar.filter(w=>!'.،!?:;،'.includes(w)).join(' '),0.76);
}
function speakStory(sid) {
  const story=STORIES.find(x=>x.id===sid);
  speak(story.sentences.map(s=>s.ar.filter(w=>!'.،!?:;،'.includes(w)).join(' ')).join(' ، '),0.74);
  const btn=document.getElementById('play-'+sid);
  if (btn) {
    btn.classList.add('speaking'); btn.innerHTML='⏹ Stop';
    btn.onclick=()=>{synth.cancel();btn.classList.remove('speaking');btn.innerHTML='🔊 Play Story';btn.onclick=()=>speakStory(sid);};
  }
}

/* ════════════════════════════════════════════════  FONT SIZE  */
const SIZES={sm:'1.7rem',md:'2.2rem',lg:'2.8rem',xl:'3.4rem'};
const PREV ={sm:'1.2rem',md:'1.6rem',lg:'2rem',  xl:'2.5rem'};
let curSize=localStorage.getItem('arSize')||'md';
function setSize(k){
  curSize=k;localStorage.setItem('arSize',k);
  document.documentElement.style.setProperty('--ar-size',SIZES[k]);
  document.getElementById('szPrev').style.fontSize=PREV[k];
  ['sm','md','lg','xl'].forEach(s=>document.getElementById('sz-'+s).classList.toggle('active',s===k));
}

/* ════════════════════════════════════════════════  STATE  */
const PUNCT=new Set(['.','،','!','?',':',';']);
let known=new Set(JSON.parse(localStorage.getItem('arKnown')||'[]'));
let activeLevel=null, popWord=null;
function saveKnown(){localStorage.setItem('arKnown',JSON.stringify([...known]));}

function allVocab(){
  const m={};
  STORIES.forEach(s=>s.vocab.forEach(v=>{m[v.ar]=v;}));
  return m;
}

/* ════════════════════════════════════════════════  PROGRESS  */
function updateProgress(){
  const vm=allVocab(), total=Object.keys(vm).length;
  document.getElementById('knownCount').textContent=known.size;
  document.getElementById('totalWords').textContent=total;
  document.getElementById('progressFill').style.width=total?(known.size/total*100)+'%':'0%';
  const sec=document.getElementById('knownSection'), chips=document.getElementById('knownChips');
  if (known.size){
    sec.style.display='block';
    chips.innerHTML=[...known].map(ar=>{const v=vm[ar];return`<span class="known-chip" title="${v?v.en:''}" onclick="chipPopup('${ar.replace(/'/g,"\\'")}'">${ar}</span>`;}).join('');
  } else sec.style.display='none';
}
function chipPopup(ar){const v=allVocab()[ar];if(!v)return;openPopup(v,'Tap word or 🔊 to hear it.');}

/* ════════════════════════════════════════════════  TABS  */
function buildTabs(){
  const levels=[...new Set(STORIES.map(s=>s.level))];
  const tabs=document.getElementById('levelTabs');
  tabs.innerHTML='<button class="level-tab active" onclick="filterLevel(null,this)">All Stories</button>';
  levels.forEach(l=>{
    const nm=STORIES.find(s=>s.level===l).levelName.split('·')[0].trim();
    tabs.innerHTML+=`<button class="level-tab" onclick="filterLevel(${l},this)">${nm}</button>`;
  });
}
function filterLevel(lv,btn){
  activeLevel=lv;
  document.querySelectorAll('.level-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active'); render(); setTimeout(initAllGames,50);
}

/* ════════════════════════════════════════════════  RENDER  */
function render(){
  const list=activeLevel?STORIES.filter(s=>s.level===activeLevel):STORIES;
  document.getElementById('storyCount').textContent=list.length;
  document.getElementById('stories').innerHTML=list.map(renderStory).join('');
}

function renderStory(story){
  const sents=story.sentences;
  const navBtns=sents.map((_,i)=>
    `<button class="sent-btn" id="sb-${story.id}-${i}" onclick="focusSent(${story.id},${i})">${i+1}</button>`
  ).join('')+
  `<button class="sent-btn" id="sb-${story.id}-all" onclick="focusSent(${story.id},-1)" style="width:auto;padding:0 10px;border-radius:12px;font-size:0.65rem">ALL</button>`;

  const arHTML=sents.map((s,si)=>{
    const words=s.ar.map(w=>{
      if (PUNCT.has(w)) return`<span style="color:#999;font-size:75%">${w}</span>`;
      const isk=known.has(w);
      const isVerb=!!VERB_DATA[w];
      const safe=w.replace(/'/g,"\\'");
      return`<span class="arabic-word${isk?' known':''}${isVerb?' is-verb':''}"
        onclick="wordClick(event,'${safe}',${story.id},${si})"
        onmouseenter="showTip(event,'${safe}')"
        onmouseleave="hideTip()"
      >${w}</span>`;
    }).join(' ');
    return`<span class="ar-sentence" id="sent-${story.id}-${si}">
      <button class="sent-spk" onclick="speakSentence(${story.id},${si})" title="Hear sentence">🔊</button>
      ${words}
    </span>`;
  }).join('');

  const vcards=story.vocab.map((v,vi)=>{
    const isk=known.has(v.ar);
    const isVerb=!!VERB_DATA[v.ar];
    const safe=v.ar.replace(/'/g,"\\'");
    return`<div class="vocab-card${isk?' known':''}${isVerb?' is-verb':''}" onclick="vocabPopup(${story.id},${vi})">
      <div class="vocab-mark">${isk?'✓':''}</div>
      <div class="vocab-top">
        <div class="vocab-ar">${v.ar}</div>
        <button class="vocab-spk" onclick="event.stopPropagation();speak('${safe}')" title="Hear">🔊</button>
      </div>
      <div class="vocab-translit">${v.translit}</div>
      <div class="vocab-en">${v.en}</div>
      ${isVerb?'<div class="vocab-tag">verb ⚙</div>':''}
    </div>`;
  }).join('');

  return`<div class="story-card" id="sc-${story.id}">
    <div class="story-header">
      <span class="story-num">Story ${story.id} · ${story.levelName}</span>
      <span class="story-title-en">${story.titleEn}</span>
      <span class="story-title-ar">${story.titleAr}</span>
    </div>
    <div class="story-body">
      <div class="sent-nav">${navBtns}</div>
      <div class="controls">
        <button class="btn btn-play" id="play-${story.id}" onclick="speakStory(${story.id})">🔊 Play Story</button>
        <button class="btn btn-outline" id="tl-${story.id}" onclick="togTranslit(${story.id})">Show Pronunciation</button>
        <button class="btn btn-outline" id="tr-${story.id}" onclick="togTransl(${story.id})">Show Translation</button>
      </div>
      <div class="arabic-text" id="at-${story.id}" dir="rtl">${arHTML}</div>
      <div class="translit" id="tlit-${story.id}">${sents.map(s=>s.translit).join('<br>')}</div>
      <div class="transl"   id="trnsl-${story.id}">${sents.map(s=>s.en).join('<br>')}</div>
      <div class="vocab-section">
        <div class="vocab-hdr">Vocabulary in this story</div>
        <div class="vocab-grid">${vcards}</div>
      </div>
      <div class="practice-zone">
        <div class="practice-hdr">
          <span class="practice-title">🎮 Practice</span>
          <div class="game-tabs">
            <button class="game-tab active" onclick="switchGame(${story.id},'flash',this)">Flashcards</button>
            <button class="game-tab" onclick="switchGame(${story.id},'mc',this)">Quiz</button>
            <button class="game-tab" onclick="switchGame(${story.id},'fill',this)">Fill the Gap</button>
          </div>
        </div>
        <div class="game-area" id="game-${story.id}"></div>
      </div>
    </div>
  </div>`;
}

/* ════════════════════════════════════════════════  VERB PANEL  */
function buildVerbPanel(vd) {
  // Coloured anatomy word
  let anatomyWord='';
  if (vd.prefix) anatomyWord+=`<span class="part-prefix">${vd.prefix}</span>`;
  anatomyWord+=`<span class="part-root">${vd.coreAr}</span>`;
  if (vd.suffix) anatomyWord+=`<span class="part-suffix">${vd.suffix}</span>`;

  // Labels
  let labels='';
  if (vd.prefix) labels+=`<span class="lbl lbl-prefix">${vd.prefix}<br>prefix</span>`;
  labels+=`<span class="lbl lbl-root">root<br><span style="font-family:Amiri,serif;font-size:1.1rem">${vd.root.join('-')}</span></span>`;
  if (vd.suffix) labels+=`<span class="lbl lbl-suffix">${vd.suffix}<br>suffix</span>`;

  // Legend
  const legend=`<div class="anatomy-legend">
    <span class="leg-item"><span class="leg-dot" style="background:var(--prefix-col)"></span> prefix (who)</span>
    <span class="leg-item"><span class="leg-dot" style="background:var(--root-col)"></span> root (meaning)</span>
    ${vd.suffix?`<span class="leg-item"><span class="leg-dot" style="background:var(--suffix-col)"></span> suffix (who/tense)</span>`:''}
  </div>`;

  // Related forms
  const formsHTML=vd.forms.map(f=>`<div class="form-item">
    <div class="form-label">${f.label}</div>
    <div class="form-ar">${f.ar}</div>
    <div class="form-tr">${f.translit}</div>
    <div class="form-en">${f.en}</div>
  </div>`).join('');

  return`
    ${legend}
    <div class="anatomy-wrap">
      <div class="anatomy-word">${anatomyWord}</div>
      <div class="anatomy-labels">${labels}</div>
    </div>
    <div class="verb-row"><span class="verb-key">Root</span><span class="verb-val"><span class="ar-inline">${vd.root.join(' · ')}</span> — "${vd.rootMeaning}"</span></div>
    <div class="verb-row"><span class="verb-key">Tense</span><span class="verb-val"><strong>${vd.tense}</strong></span></div>
    <div class="verb-row"><span class="verb-key">Pattern</span><span class="verb-val">${vd.pattern}</span></div>
    <div class="verb-explain">${vd.explain}</div>
    <div style="margin-top:14px">
      <div class="verb-row" style="margin-bottom:8px"><span class="verb-key">See also</span><span class="verb-val" style="font-size:0.8rem;color:var(--muted)">related forms of this verb</span></div>
      <div class="forms-grid">${formsHTML}</div>
    </div>`;
}

/* ════════════════════════════════════════════════  POPUP  */
function openPopup(v, ctx) {
  popWord=v;
  document.getElementById('popAr').textContent=v.ar;
  document.getElementById('popTr').textContent=v.translit;
  document.getElementById('popEn').textContent=v.en;
  document.getElementById('popCtx').textContent=ctx;

  // Verb panel
  const panel=document.getElementById('verbPanel');
  const body=document.getElementById('verbPanelBody');
  const vd=VERB_DATA[v.ar];
  if (vd) {
    body.innerHTML=buildVerbPanel(vd);
    panel.style.display='block';
  } else {
    panel.style.display='none';
  }

  document.getElementById('overlay').classList.add('on');
  setTimeout(()=>speak(v.ar),250);
}

function wordClick(e,ar,sid,si){
  e.stopPropagation(); hideTip();
  const v=allVocab()[ar]; if(!v) return;
  const ctx='"'+STORIES.find(s=>s.id===sid).sentences[si].en+'"';
  openPopup(v,ctx);
}
function vocabPopup(sid,vi){
  const story=STORIES.find(s=>s.id===sid);
  openPopup(story.vocab[vi],`From: ${story.titleEn} — ${story.levelName}`);
}
function closePopup(){
  synth&&synth.cancel();
  document.getElementById('overlay').classList.remove('on');
  popWord=null;
}
function markKnown(){
  if(!popWord)return;
  known.has(popWord.ar)?known.delete(popWord.ar):known.add(popWord.ar);
  saveKnown(); closePopup(); updateProgress(); render();
}

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closePopup();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup();});

/* ════════════════════════════════════════════════  SENTENCE FOCUS  */
function focusSent(sid,si){
  const story=STORIES.find(s=>s.id===sid);
  story.sentences.forEach((_,i)=>{
    const b=document.getElementById(`sb-${sid}-${i}`);
    const el=document.getElementById(`sent-${sid}-${i}`);
    if(b)b.classList.toggle('active',si===i);
    if(el)el.style.display=(si===-1||si===i)?'block':'none';
  });
  const ab=document.getElementById(`sb-${sid}-all`);
  if(ab)ab.classList.toggle('active',si===-1);
  const tl=document.getElementById(`tlit-${sid}`),tr=document.getElementById(`trnsl-${sid}`);
  if(tl&&tl.classList.contains('on'))tl.innerHTML=si===-1?story.sentences.map(s=>s.translit).join('<br>'):story.sentences[si].translit;
  if(tr&&tr.classList.contains('on'))tr.innerHTML=si===-1?story.sentences.map(s=>s.en).join('<br>'):story.sentences[si].en;
  if(si>=0)speakSentence(sid,si);
}

function togTranslit(sid){
  const el=document.getElementById(`tlit-${sid}`),btn=document.getElementById(`tl-${sid}`);
  el.classList.toggle('on');btn.classList.toggle('active');
  btn.textContent=el.classList.contains('on')?'Hide Pronunciation':'Show Pronunciation';
}
function togTransl(sid){
  const el=document.getElementById(`trnsl-${sid}`),btn=document.getElementById(`tr-${sid}`);
  el.classList.toggle('on');btn.classList.toggle('active');
  btn.textContent=el.classList.contains('on')?'Hide Translation':'Show Translation';
}

/* ════════════════════════════════════════════════  TOOLTIP  */
function showTip(e,ar){
  const v=allVocab()[ar]; if(!v)return;
  document.getElementById('tipAr').textContent=v.ar;
  document.getElementById('tipTr').textContent=v.translit;
  document.getElementById('tipEn').textContent=v.en;
  const vd=VERB_DATA[v.ar];
  const tv=document.getElementById('tipVerb');
  tv.textContent=vd?`verb · ${vd.tense} · root: ${vd.root.join('-')} "${vd.rootMeaning}"  ⚙ click for breakdown`:'';
  document.getElementById('tip').classList.add('on');
  posTip(e);
}
function posTip(e){
  const t=document.getElementById('tip');
  let x=e.clientX+18,y=e.clientY+18;
  if(x+240>window.innerWidth)x=e.clientX-248;
  if(y+150>window.innerHeight)y=e.clientY-156;
  t.style.left=x+'px';t.style.top=y+'px';
}
function hideTip(){document.getElementById('tip').classList.remove('on');}
document.addEventListener('mousemove',e=>{if(document.getElementById('tip').classList.contains('on'))posTip(e);});


/* ════════════════════════════════════════════════
   PRACTICE GAMES
════════════════════════════════════════════════ */

// Game state per story
const gameState = {};

function getGameState(sid) {
  if (!gameState[sid]) gameState[sid] = { mode:'flash', fc:{idx:0,flipped:false,score:0,total:0}, mc:{idx:0,score:0,total:0,done:false}, fill:{idx:0,score:0,total:0,done:false} };
  return gameState[sid];
}

function switchGame(sid, mode, btn) {
  const gs = getGameState(sid);
  gs.mode = mode;
  // update tab styling
  const tabs = btn.parentElement.querySelectorAll('.game-tab');
  tabs.forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderGame(sid);
}

function renderGame(sid) {
  const story = STORIES.find(s => s.id === sid);
  const gs = getGameState(sid);
  const area = document.getElementById('game-' + sid);
  if (!area) return;
  if (gs.mode === 'flash') area.innerHTML = buildFlash(story, gs);
  else if (gs.mode === 'mc')   area.innerHTML = buildMC(story, gs);
  else if (gs.mode === 'fill') area.innerHTML = buildFill(story, gs);
}

// ─── FLASHCARDS ───────────────────────────────
function buildFlash(story, gs) {
  const words = story.vocab;
  const fc = gs.fc;
  if (fc.idx >= words.length) {
    return resultScreen(fc.score, words.length,
      `<button class="btn-restart btn-teal" onclick="resetFlash(${story.id})">🔄 Again</button>
       <button class="btn-restart btn-gold-bg" onclick="switchGameById(${story.id},'mc')">Try the Quiz →</button>`);
  }
  const v = words[fc.idx];
  const safe = v.ar.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  return `
    <div class="score-strip">
      <div class="score-pill">Card <span>${fc.idx+1}</span> / ${words.length}</div>
      <div class="progress-dots">${words.map((_,i)=>`<div class="pdot${i<fc.idx?(i<fc.score?' correct':' wrong'):(i===fc.idx?' cur':'')}"></div>`).join('')}</div>
    </div>
    <div class="flashcard-wrap" onclick="flipCard(${story.id})">
      <div class="flashcard${fc.flipped?' flipped':''}" id="fc-${story.id}">
        <div class="fc-face fc-front">
          <div class="fc-label">Arabic — tap to reveal</div>
          <div class="fc-ar">${v.ar}</div>
          <div class="fc-tr">${v.translit}</div>
          <div class="fc-hint">Tap card to see meaning</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-label">English meaning</div>
          <div class="fc-en">${v.en}</div>
          <div class="fc-ar" style="font-size:1.8rem;margin-top:6px">${v.ar}</div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="fc-btn fc-no" onclick="fcAnswer(${story.id},false)">✗ Still learning</button>
      <span class="fc-counter">${fc.flipped ? 'Did you know it?' : 'Flip first!'}</span>
      <button class="fc-btn fc-yes" onclick="fcAnswer(${story.id},true)">✓ Got it!</button>
    </div>
    <div style="text-align:center;margin-top:6px">
      <button class="fc-btn fc-skip" onclick="fcSpeak('${safe}')">🔊 Hear word</button>
    </div>`;
}

function flipCard(sid) {
  const gs = getGameState(sid); gs.fc.flipped = !gs.fc.flipped; renderGame(sid);
}
function fcSpeak(ar) { speak(ar); }
function fcAnswer(sid, correct) {
  const gs = getGameState(sid);
  if (!gs.fc.flipped) { gs.fc.flipped = true; renderGame(sid); return; }
  if (correct) gs.fc.score++;
  gs.fc.idx++; gs.fc.flipped = false; gs.fc.total++;
  renderGame(sid);
}
function resetFlash(sid) { getGameState(sid).fc = {idx:0,flipped:false,score:0,total:0}; renderGame(sid); }

// ─── MULTIPLE CHOICE QUIZ ─────────────────────
function buildMC(story, gs) {
  const words = story.vocab;
  const mc = gs.mc;
  if (mc.done || mc.idx >= words.length) {
    return resultScreen(mc.score, words.length,
      `<button class="btn-restart btn-teal" onclick="resetMC(${story.id})">🔄 Try Again</button>
       <button class="btn-restart btn-gold-bg" onclick="switchGameById(${story.id},'fill')">Fill the Gap →</button>`);
  }
  const v = words[mc.idx];
  // Pick 3 wrong answers from rest of vocab
  const others = words.filter((_,i) => i !== mc.idx);
  const wrong = shuffle(others).slice(0, 3).map(w => w.en);
  const choices = shuffle([v.en, ...wrong]);
  const safe = v.ar.replace(/'/g,"\\'");

  return `
    <div class="score-strip">
      <div class="score-pill">Q <span>${mc.idx+1}</span> / ${words.length}</div>
      <div class="score-pill">Score <span>${mc.score}</span></div>
      <div class="progress-dots">${words.map((_,i)=>`<div class="pdot${i<mc.idx?' correct':(i===mc.idx?' cur':'')}"></div>`).join('')}</div>
    </div>
    <div class="mc-question">
      <div class="mc-prompt">What does this word mean?</div>
      <div class="mc-arabic" onclick="speak('${safe}')">${v.ar}</div>
      <div class="mc-translit">${v.translit}</div>
    </div>
    <div class="mc-choices">
      ${choices.map(c => `<button class="mc-choice" onclick="mcAnswer(${story.id},'${c.replace(/'/g,"\\'")}','${v.en.replace(/'/g,"\\'")}')">${c}</button>`).join('')}
    </div>
    <div class="mc-feedback" id="mc-fb-${story.id}"></div>`;
}

function mcAnswer(sid, chosen, correct) {
  const gs = getGameState(sid);
  const area = document.getElementById('game-' + sid);
  const btns = area.querySelectorAll('.mc-choice');
  btns.forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
    else if (b.textContent === chosen && chosen !== correct) b.classList.add('wrong');
  });
  const fb = document.getElementById('mc-fb-' + sid);
  const right = chosen === correct;
  if (right) { gs.mc.score++; fb.textContent = '✓ Correct! Well done.'; fb.className='mc-feedback good'; }
  else { fb.textContent = `✗ It was "${correct}"`; fb.className='mc-feedback bad'; }
  if (right) speak(STORIES.find(s=>s.id===sid).vocab[gs.mc.idx].ar);
  gs.mc.idx++;
  if (gs.mc.idx >= STORIES.find(s=>s.id===sid).vocab.length) gs.mc.done = true;
  setTimeout(() => renderGame(sid), right ? 1100 : 1600);
}
function resetMC(sid) { const gs=getGameState(sid); gs.mc={idx:0,score:0,total:0,done:false}; renderGame(sid); }

// ─── FILL THE GAP ─────────────────────────────
function buildFill(story, gs) {
  const sents = story.sentences.filter(s => s.ar.filter(w => !PUNCT.has(w)).length >= 3);
  const fill = gs.fill;
  if (fill.done || fill.idx >= sents.length) {
    return resultScreen(fill.score, sents.length,
      `<button class="btn-restart btn-teal" onclick="resetFill(${story.id})">🔄 Try Again</button>
       <button class="btn-restart btn-gold-bg" onclick="switchGameById(${story.id},'flash')">← Flashcards</button>`);
  }
  const sent = sents[fill.idx];
  // Pick a content word to blank out (not punctuation, prefer vocab words)
  const contentWords = sent.ar.filter(w => !PUNCT.has(w));
  const vocabInSent = contentWords.filter(w => story.vocab.some(v => v.ar === w));
  const target = vocabInSent.length > 0 ? vocabInSent[Math.floor(Math.random() * vocabInSent.length)] : contentWords[Math.floor(contentWords.length/2)];
  
  // Build sentence with blank
  const sentHTML = sent.ar.map(w => {
    if (PUNCT.has(w)) return `<span style="color:#999;font-size:70%">${w}</span>`;
    if (w === target) return `<span class="fb-blank" id="fb-blank-${story.id}">___</span>`;
    return `<span>${w}</span>`;
  }).join(' ');

  // Distractors from vocab
  const others = story.vocab.filter(v => v.ar !== target).map(v => v.ar);
  const distractors = shuffle(others).slice(0,3);
  const chips = shuffle([target, ...distractors]);

  gs.fill._target = target;
  gs.fill._sents = sents;

  return `
    <div class="score-strip">
      <div class="score-pill">Sentence <span>${fill.idx+1}</span> / ${sents.length}</div>
      <div class="score-pill">Score <span>${fill.score}</span></div>
      <div class="progress-dots">${sents.map((_,i)=>`<div class="pdot${i<fill.idx?' correct':(i===fill.idx?' cur':'')}"></div>`).join('')}</div>
    </div>
    <div class="fb-en-hint">💬 "${sent.en}"</div>
    <div class="fb-sentence" dir="rtl">${sentHTML}</div>
    <div style="font-size:0.82rem;color:var(--muted);margin-bottom:8px">Choose the missing word:</div>
    <div class="fb-choices">
      ${chips.map(w => `<button class="fb-chip" onclick="fillAnswer(${story.id},'${w.replace(/'/g,"\\'")}',this)">${w}</button>`).join('')}
    </div>
    <div class="fb-feedback" id="fb-fb-${story.id}"></div>`;
}

function fillAnswer(sid, chosen, btn) {
  const gs = getGameState(sid);
  const target = gs.fill._target;
  const area = document.getElementById('game-' + sid);
  const chips = area.querySelectorAll('.fb-chip');
  chips.forEach(c => c.disabled = true);
  const blank = document.getElementById('fb-blank-' + sid);
  const right = chosen === target;
  btn.classList.add(right ? 'correct-chip' : 'wrong-chip');
  if (!right) chips.forEach(c => { if (c.textContent.trim() === target) c.classList.add('correct-chip'); });
  if (blank) { blank.textContent = chosen; blank.classList.add(right ? 'filled-correct' : 'filled-wrong'); }
  const fb = document.getElementById('fb-fb-' + sid);
  if (right) { gs.fill.score++; fb.textContent = '✓ Correct!'; fb.className='fb-feedback good'; speak(target); }
  else { fb.textContent = `✗ The answer was: ${target}`; fb.className='fb-feedback bad'; }
  gs.fill.idx++;
  if (gs.fill.idx >= gs.fill._sents.length) gs.fill.done = true;
  setTimeout(() => renderGame(sid), right ? 1100 : 1700);
}
function resetFill(sid) { const gs=getGameState(sid); gs.fill={idx:0,score:0,total:0,done:false}; renderGame(sid); }

// ─── HELPERS ──────────────────────────────────
function switchGameById(sid, mode) {
  const area = document.getElementById('game-' + sid);
  const tabs = area.parentElement.querySelectorAll('.game-tab');
  const modeMap = {flash:0, mc:1, fill:2};
  tabs.forEach((t,i) => t.classList.toggle('active', i === modeMap[mode]));
  getGameState(sid).mode = mode;
  renderGame(sid);
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function resultScreen(score, total, actions) {
  const pct = total > 0 ? Math.round(score/total*100) : 0;
  const stars = pct >= 80 ? '★★★' : pct >= 50 ? '★★☆' : '★☆☆';
  const emoji = pct >= 80 ? '🎉' : pct >= 50 ? '👍' : '💪';
  const msg = pct >= 80 ? 'Excellent! You know these words well.' : pct >= 50 ? 'Good effort — keep practising!' : 'Keep going — it gets easier!';
  return `<div class="result-screen">
    <div class="result-emoji">${emoji}</div>
    <div class="result-score">${score} / ${total}</div>
    <div class="result-stars">${stars}</div>
    <div class="result-msg">${msg}</div>
    ${actions}
  </div>`;
}

// Initialise all game areas after render
function initAllGames() {
  STORIES.forEach(s => {
    const area = document.getElementById('game-' + s.id);
    if (area && area.innerHTML.trim() === '') renderGame(s.id);
  });
}

/* ════════════════════════════════════════════════  INIT  */
initAudio();
setSize(curSize);
buildTabs();
render();
updateProgress();
setTimeout(initAllGames, 50);
</script>
